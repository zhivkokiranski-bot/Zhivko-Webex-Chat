<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моят GitHub Сайт</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #24292e; }
        p { color: #666; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2da44e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover { background-color: #2c974b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Здравейте! 👋</h1>
        <p>Това е моят проект, хостнат успешно в <strong>GitHub Pages</strong>.</p>
        <p>Можете да редактирате този файл, за да добавите вашето съдържание.</p>
        <a href="https://github.com" class="btn">Виж кода в GitHub</a>
    </div>

</body>
</html>
